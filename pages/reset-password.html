<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>dunzo — Reset Password</title>
  <link rel="stylesheet" href="../css/styles.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.19.0/dist/tabler-icons.min.css">
  <link rel="icon" type="image/png" href="../assets/favicon.ico">
</head>
<body class="dark-mode">
  <div class="page">
    <div class="bg-deco" aria-hidden="true"><div class="tile tile-tl"></div></div>

    <nav class="top-nav">
      <a href="sign-in.html" class="logo">dunzo<span class="dot">.</span></a>
    </nav>

    <main class="page-center">
      <section class="auth-card" id="reset-card">

        <p class="eyebrow">Password reset</p>
        <h1 style="font-family:var(--font-display);font-size:36px;margin-bottom:10px">
          New password
        </h1>
        <p class="subtitle">Choose a strong password for your account.</p>

        <form id="reset-form" class="auth-form">

          <div class="form-group">
            <label for="new-password">New password</label>
            <div class="input-wrap">
              <input type="password" id="new-password" class="auth-input"
                     placeholder="At least 8 characters" autocomplete="new-password">
              <button type="button" class="toggle-pw" id="toggle-pw">
                <i class="ti ti-eye"></i>
              </button>
            </div>
            <p class="field-error" id="pw-error">Password must be at least 8 characters</p>
          </div>

          <div class="form-group">
            <label for="confirm-password">Confirm password</label>
            <input type="password" id="confirm-password" class="auth-input"
                   placeholder="Repeat your password" autocomplete="new-password">
            <p class="field-error" id="confirm-error">Passwords do not match</p>
          </div>

          <button type="submit" class="btn btn-primary" id="reset-btn">
            Reset password
          </button>

        </form>

        <div id="success-msg" style="display:none;text-align:center;padding:16px 0">
          <p style="font-size:32px;margin-bottom:12px">✅</p>
          <p style="color:var(--muted)">Password updated.</p>
          <a href="sign-in.html" style="color:var(--accent);display:inline-block;margin-top:16px">
            Sign in
          </a>
        </div>

      </section>
    </main>
  </div>

  <script>
    const API_URL = "http://localhost:8000";
    const token   = new URLSearchParams(window.location.search).get("token");

    if (!token) {
      document.getElementById("reset-form").innerHTML =
        `<p style="color:var(--danger)">Invalid or missing reset token.</p>
         <a href="sign-in.html" style="color:var(--accent)">Back to sign in</a>`;
    }

    document.getElementById("toggle-pw")?.addEventListener("click", () => {
      const input = document.getElementById("new-password");
      const icon  = document.querySelector("#toggle-pw i");
      const isHidden = input.type === "password";
      input.type = isHidden ? "text" : "password";
      if (icon) icon.className = isHidden ? "ti ti-eye-off" : "ti ti-eye";
    });

    document.getElementById("reset-form")?.addEventListener("submit", async (e) => {
      e.preventDefault();

      const password = document.getElementById("new-password").value;
      const confirm  = document.getElementById("confirm-password").value;

      document.getElementById("pw-error").classList.remove("visible");
      document.getElementById("confirm-error").classList.remove("visible");

      let valid = true;
      if (password.length < 8) {
        document.getElementById("pw-error").classList.add("visible");
        valid = false;
      }
      if (password !== confirm) {
        document.getElementById("confirm-error").classList.add("visible");
        valid = false;
      }
      if (!valid) return;

      const btn = document.getElementById("reset-btn");
      btn.textContent = "Resetting...";
      btn.disabled    = true;

      try {
        const res = await fetch(`${API_URL}/auth/email/reset-password`, {
          method:  "POST",
          headers: { "Content-Type": "application/json" },
          body:    JSON.stringify({ token, password }),
        });

        const data = await res.json();

        if (!res.ok) {
          alert(data.detail || "Reset failed. The link may have expired.");
          return;
        }

        document.getElementById("reset-form").style.display   = "none";
        document.getElementById("success-msg").style.display  = "block";

      } catch (err) {
        alert("Something went wrong. Please try again.");
        console.error(err);
      } finally {
        btn.textContent = "Reset password";
        btn.disabled    = false;
      }
    });
  </script>
</body>
</html>
