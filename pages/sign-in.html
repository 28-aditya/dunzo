<!DOCTYPE html>
<html lang="en">

<head>

  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>dunzo — Sign in</title>

  <link rel="stylesheet" href="../css/styles.css">

  <link rel="stylesheet"
    href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.19.0/dist/tabler-icons.min.css">
  
    <link rel="icon" type="image/png" href="../assets/favicon.ico">

</head>

<body class="dark-mode" id="signin-body">

  <div class="page auth-page" id="signin-page">

    <!-- BACKGROUND -->

    <div class="bg-deco" aria-hidden="true">

      <div class="tile tile-tl"></div>

      <div class="tile tile-tr"></div>

      <div class="tile tile-br"></div>

    </div>

    <!-- NAVBAR -->

    <nav class="top-nav" id="signin-navbar">

      <a
        href="homepage.html"
        class="logo"
        id="signin-logo">

        dunzo<span class="dot">.</span>

      </a>

    </nav>

    <!-- MAIN -->

    <main class="page-center" id="signin-main">

      <section
        class="auth-card"
        id="signin-card">

        <!-- HEADER -->

        <div class="auth-header" id="signin-header">

          <p class="eyebrow" id="signin-eyebrow">
            Welcome back
          </p>

          <h1 id="signin-title">
            Sign<br>
            in
          </h1>

          <p class="subtitle" id="signin-subtitle">
            Continue to your workspace.
          </p>

        </div>

        <!-- OAUTH -->


          <button
            class="btn-oauth"
            id="google-signin-btn"
            type="button">

            <svg
              viewBox="0 0 24 24"
              fill="none"
              xmlns="http://www.w3.org/2000/svg">

              <path
                d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"
                fill="#4285F4" />

              <path
                d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"
                fill="#34A853" />

              <path
                d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z"
                fill="#FBBC05" />

              <path
                d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"
                fill="#EA4335" />

            </svg>

            Google

          </button>


        <!-- DIVIDER -->

        <div class="divider" id="signin-divider">
          or continue with email
        </div>

        <!-- FORM -->

        <form
          id="signin-form"
          class="auth-form">

          <!-- EMAIL -->

          <div
            class="form-group"
            id="email-group">

            <label for="email-input">
              Email
            </label>

            <input
              type="email"
              id="email-input"
              name="email"
              class="auth-input"
              placeholder="Enter your Email"
              autocomplete="email">

          </div>

          <!-- PASSWORD -->

          <div
            class="form-group"
            id="password-group">

            <div class="row-between">

              <label for="password-input">
                Password
              </label>

              <a
                href="#"
                class="forgot-link"
                id="forgot-password-link">

                Forgot password?

              </a>

            </div>

            <div
              class="input-wrap"
              id="password-input-wrap">

              <input
                type="password"
                id="password-input"
                name="password"
                class="auth-input"
                placeholder="Enter your password"
                autocomplete="current-password">

              <button
                type="button"
                class="toggle-pw"
                id="toggle-password-btn">

                <i class="ti ti-eye"></i>

              </button>

            </div>

          </div>

          <!-- REMEMBER -->

          <div
            class="check-row"
            id="remember-row">

            <input
              type="checkbox"
              id="remember-checkbox"
              name="remember">

            <span>
              Keep me signed in
            </span>

          </div>

          <!-- SUBMIT -->

          <button
            type="submit"
            class="btn btn-primary"
            id="signin-submit-btn">

            Sign in

          </button>

        </form>

        <!-- FOOTER -->

        <p
          class="auth-footer"
          id="signin-footer">

          Don't have an account?

          <a
            href="create-account.html"
            id="create-account-link">

            Create account

          </a>

        </p>

      </section>

    </main>

  </div>

<script src="../scripts/models.js"></script>
<script src="../scripts/state.js"></script>
<script src="../scripts/signIn.js"></script>


</body>

</html>
