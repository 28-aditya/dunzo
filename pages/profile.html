<!DOCTYPE html>
<html lang="en">

<head>

  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>dunzo — Profile</title>

  <link rel="stylesheet" href="../css/styles.css">
  <link rel="icon" type="image/png" href="../assets/favicon.ico">

</head>

<body class="dark-mode" id="profile-body">

  <div class="dash-layout" id="profile-layout">

    <!-- SIDEBAR -->

    <aside class="sidebar" id="profile-sidebar">

      <!-- LOGO -->

      <div class="sidebar-logo" id="sidebar-logo">

        dunzo<span class="dot">.</span>

      </div>

      <!-- WORKSPACE -->

      <div class="sidebar-section" id="workspace-section">

        <p class="sidebar-label">
          Workspace
        </p>

        <a
          href="dashboard.html"
          class="sidebar-item"
          id="dashboard-link">

          <span class="icon">⌂</span>

          Dashboard

        </a>

        <a
          href="#"
          class="sidebar-item"
          id="today-link">

          <span class="icon">◉</span>

          Today

        </a>

        <a
          href="#"
          class="sidebar-item"
          id="upcoming-link">

          <span class="icon">◎</span>

          Upcoming

        </a>

        <a
          href="#"
          class="sidebar-item"
          id="completed-link">

          <span class="icon">✓</span>

          Completed

        </a>

      </div>

      <!-- ACCOUNT -->

      <div class="sidebar-section" id="account-section">

        <p class="sidebar-label">
          Account
        </p>

        <a
          href="profile.html"
          class="sidebar-item active"
          id="profile-link">

          <span class="icon">☺</span>

          Profile

        </a>

        <a
          href="#"
          class="sidebar-item"
          id="settings-link">

          <span class="icon">⚙</span>

          Settings

        </a>

      </div>

      <div class="sidebar-spacer"></div>

      <!-- USER -->

      <div class="sidebar-user" id="sidebar-user">

        <div class="avatar" id="sidebar-avatar">
          A
        </div>

        <div class="user-info">

          <p id="sidebar-username">
            Aditya Sharma
          </p>

          <span id="sidebar-email">
            aditya@dunzo.app
          </span>

        </div>

      </div>

    </aside>

    <!-- MAIN -->

    <main class="dash-main" id="profile-main">

      <!-- HEADER -->

      <div class="dash-header" id="profile-header">

        <div>

          <h1 id="profile-page-title">
            Profile
          </h1>

          <p id="profile-page-subtitle">
            Manage your account information.
          </p>

        </div>

        <div class="header-actions" id="profile-header-actions">

          <button
            class="btn-icon"
            id="theme-toggle-btn">

            🎨

          </button>

          <button
            class="btn-new"
            id="save-profile-btn">

            Save Changes

          </button>

        </div>

      </div>

      <!-- CONTENT -->

      <div class="dash-content" id="profile-content">

        <!-- PROFILE CARD -->

        <section
          class="task-card profile-card"
          id="profile-card">

          <!-- PROFILE TOP -->

          <div
            class="profile-top"
            id="profile-top">

            <div
              class="avatar profile-avatar-large"
              id="profile-avatar-large">

              A

            </div>

            <div class="profile-heading">

              <h2 id="profile-name-display">
                Aditya Sharma
              </h2>

              <p id="profile-username-display">
                @aditya
              </p>

            </div>

          </div>

          <!-- PROFILE FORM -->

          <form
            class="profile-form"
            id="profile-form">

            <!-- FULL NAME -->

            <div
              class="form-group"
              id="full-name-group">

              <label
                for="full-name-input">

                Full Name

              </label>

              <input
                type="text"
                id="full-name-input"
                class="profile-input"
                value="Aditya Sharma">

            </div>

            <!-- USERNAME -->

            <div
              class="form-group"
              id="username-group">

              <label
                for="username-input">

                Username

              </label>

              <input
                type="text"
                id="username-input"
                class="profile-input"
                value="aditya">

            </div>

            <!-- EMAIL -->

            <div
              class="form-group"
              id="email-group">

              <label
                for="email-input">

                Email

              </label>

              <input
                type="email"
                id="email-input"
                class="profile-input"
                value="aditya@dunzo.app">

            </div>

            <!-- BIO -->

            <div
              class="form-group"
              id="bio-group">

              <label
                for="bio-input">

                Bio

              </label>

              <input
                type="text"
                id="bio-input"
                class="profile-input"
                value="Computer Science student building dunzo.">

            </div>

          </form>

        </section>

        <!-- ACCOUNT STATS -->

        <section
          class="stats-grid"
          id="profile-stats-grid">

          <div
            class="stat-card"
            id="tasks-completed-card">

            <p class="stat-label">
              Tasks Completed
            </p>

            <p
              class="stat-value"
              id="tasks-completed-value">

              128

            </p>

          </div>

          <div
            class="stat-card"
            id="current-streak-card">

            <p class="stat-label">
              Current Streak
            </p>

            <p
              class="stat-value"
              id="current-streak-value">

              12

            </p>

          </div>

          <div
            class="stat-card"
            id="productivity-card">

            <p class="stat-label">
              Productivity
            </p>

            <p
              class="stat-value"
              id="productivity-value">

              91%

            </p>

          </div>

          <div
            class="stat-card"
            id="member-since-card">

            <p class="stat-label">
              Member Since
            </p>

            <p
              class="stat-value"
              id="member-since-value">

              2025

            </p>

          </div>

        </section>

      </div>

    </main>

  </div>

<script src="script.js"></script>

</body>

</html>
