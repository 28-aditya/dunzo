<!DOCTYPE html>
<html lang="en">

<head>

  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>dunzo — Profile</title>

  <link rel="stylesheet" href="styles.css">

</head>

<body>

  <div class="dash-layout">

    <!-- SIDEBAR -->

    <aside class="sidebar">

      <div class="sidebar-logo">
        dunzo<span class="dot">.</span>
      </div>

      <div class="sidebar-section">

        <p class="sidebar-label">
          Workspace
        </p>

        <a href="dashboard.html" class="sidebar-item">
          <span class="icon">⌂</span>
          Dashboard
        </a>

        <a href="#" class="sidebar-item">
          <span class="icon">◉</span>
          Today
        </a>

        <a href="#" class="sidebar-item">
          <span class="icon">◎</span>
          Upcoming
        </a>

        <a href="#" class="sidebar-item">
          <span class="icon">✓</span>
          Completed
        </a>

      </div>

      <div class="sidebar-section">

        <p class="sidebar-label">
          Account
        </p>

        <a href="profile.html" class="sidebar-item active">
          <span class="icon">☺</span>
          Profile
        </a>

        <a href="#" class="sidebar-item">
          <span class="icon">⚙</span>
          Settings
        </a>

      </div>

      <div class="sidebar-spacer"></div>

      <div class="sidebar-user">

        <div class="avatar">
          A
        </div>

        <div class="user-info">

          <p>
            Aditya Sharma
          </p>

          <span>
            aditya@dunzo.app
          </span>

        </div>

      </div>

    </aside>

    <!-- MAIN -->

    <main class="dash-main">

      <div class="dash-header">

        <div>

          <h1>
            Profile
          </h1>

          <p>
            Manage your account information.
          </p>

        </div>

        <div class="header-actions">

          <button class="btn-new">
            Save Changes
          </button>

        </div>

      </div>

      <div class="dash-content">

        <!-- PROFILE CARD -->

        <div class="task-card" style="padding: 32px; margin-bottom: 24px;">

          <div style="display:flex; align-items:center; gap:20px; margin-bottom:28px;">

            <div class="avatar"
              style="width:80px; height:80px; font-size:28px;">

              A

            </div>

            <div>

              <h2 style="font-size:28px; margin-bottom:4px;">
                Aditya Sharma
              </h2>

              <p style="color: var(--muted);">
                @aditya
              </p>

            </div>

          </div>

          <!-- FORM -->

          <div class="form-group">

            <label>
              Full Name
            </label>

            <input
              type="text"
              value="Aditya Sharma">

          </div>

          <div class="form-group">

            <label>
              Username
            </label>

            <input
              type="text"
              value="aditya">

          </div>

          <div class="form-group">

            <label>
              Email
            </label>

            <input
              type="email"
              value="aditya@dunzo.app">

          </div>

          <div class="form-group">

            <label>
              Bio
            </label>

            <input
              type="text"
              value="Computer Science student building dunzo.">

          </div>

        </div>

        <!-- ACCOUNT STATS -->

        <div class="stats-grid">

          <div class="stat-card">

            <p class="stat-label">
              Tasks Completed
            </p>

            <p class="stat-value">
              128
            </p>

          </div>

          <div class="stat-card">

            <p class="stat-label">
              Current Streak
            </p>

            <p class="stat-value">
              12
            </p>

          </div>

          <div class="stat-card">

            <p class="stat-label">
              Productivity
            </p>

            <p class="stat-value">
              91%
            </p>

          </div>

          <div class="stat-card">

            <p class="stat-label">
              Member Since
            </p>

            <p class="stat-value">
              2025
            </p>

          </div>

        </div>

      </div>

    </main>

  </div>

</body>

</html>
